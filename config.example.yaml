project:
  name: video-dubber
  output_format: mp4
  domain: mathematics
  output_dir: ./output
  workspace_dir: ./workspace

runtime:
  max_parallel_jobs: 1
  asr_concurrency: 4
  llm_concurrency: 2
  tts_concurrency: 4
  retry_max_attempts: 3
  retry_backoff_sec: 2
  request_timeout_sec: 120

input:
  allowed_extensions: [".mp4", ".mkv", ".mov"]
  max_file_size_mb: 4096
  max_duration_minutes: 180

vad:
  mode: asr_context_chunks
  frame_ms: 100
  threshold_ratio: 0.08
  min_duration_ms: 900
  max_duration_ms: 90000
  min_speech_duration_ms: 700
  target_min_chunk_ms: 20000
  preferred_max_chunk_ms: 45000
  hard_max_chunk_ms: 90000
  silence_merge_threshold_ms: 2500
  context_padding_ms: 1500
  soft_split_allowed: true
  # Optional Silero backend. Keep mode as asr_context_chunks unless onnxruntime
  # is installed. The ONNX model downloads automatically on first use.
  silero_model_path: models/silero_vad.onnx
  silero_model_url: https://raw.githubusercontent.com/snakers4/silero-vad/master/src/silero_vad/data/silero_vad.onnx
  silero_auto_download: true
  silero_threshold: 0.5
  min_silence_duration_ms: 500
  speech_padding_ms: 250
  max_vad_chunk_ms: 30000
  merge_gap_ms: 300

translation:
  glossary_review: true
  min_context_words: 120
  max_context_words: 350
  context_overlap_words: 40
  target_segment_count: 6

transcript_segmentation:
  target_min_segment_ms: 8000
  preferred_max_segment_ms: 25000
  max_segment_ms: 45000
  min_pause_split_ms: 600
  prefer_punctuation_split: true

mixing:
  original_ducking_db: -22
  tts_boost_db: 8.0
  final_loudness_normalization: true

subtitles:
  enabled: false
  mode: burn_in
  output_sidecar: true
  max_height_ratio: 0.10
  background_opacity: 0.50
  font_family: Arial
  font_size_ratio: 0.026
  bottom_margin_ratio: 0.035
  source_enabled: true
  translation_enabled: true
  max_cue_duration_ms: 4000
  min_cue_duration_ms: 700
  max_chars_per_line: 48

asr_service:
  provider: openai_compatible
  base_url: ${ASR_BASE_URL}
  api_key: ${ASR_API_KEY}
  model: whisper-1
  language: en
  timestamp_mode: prefer_word
  require_timestamps: true
  allow_chunk_text_fallback: false
  vad_filter: false

llm_service:
  provider: openai_compatible
  base_url: ${LLM_BASE_URL}
  api_key: ${LLM_API_KEY}
  model: gpt-4o-mini
  temperature: 0.3

tts_service:
  provider: openai_compatible
  base_url: ${TTS_BASE_URL}
  api_key: ${TTS_API_KEY}
  model: tts-1
  voice: nova
  quality_retry_attempts: 3
  rephrase_attempts: 2
  max_speedup_ratio: 1.3
  min_rms: 500
  silence_rms_threshold: 120
  max_edge_silence_ms: 1200
  max_internal_silence_ms: 2500
  clipping_peak_threshold: 32760
  max_clipped_sample_ratio: 0.001
  clause_pause_threshold_ms: 700
